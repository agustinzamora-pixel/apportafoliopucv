<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portafolio PUCV · Centros I+D</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1A3A6B; --blue:#1A5FAD; --blue-mid:#2E6FD9;
  --blue-light:#EEF4FD; --blue-pale:#F4F8FF;
  --green:#1A7A3A; --green-light:#E8F5EC;
  --amber:#B45309; --amber-light:#FEF3C7;
  --border:#E0E0E0; --border-2:#CBD5E1;
  --bg:#F2F4F7; --surface:#FFFFFF; --surface-2:#F8F8F8;
  --text:#1A1A1A; --muted:#666; --subtle:#999;
  --r:8px; --r-lg:14px; --r-xl:18px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.07);
  --shadow:0 2px 10px rgba(0,0,0,.09);
  --shadow-md:0 6px 24px rgba(0,0,0,.11);
  --shadow-lg:0 12px 40px rgba(0,0,0,.13);
  --font:'Plus Jakarta Sans',-apple-system,sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.55;-webkit-font-smoothing:antialiased}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:stretch;
  background:linear-gradient(135deg,#0D2355 0%,#1B4FA8 55%,#2E6FD9 100%);
  min-height:64px;
}
.topbar::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 150% at 50% 200%,rgba(255,255,255,.06) 0%,transparent 60%);
  pointer-events:none;
}
.topbar-logos{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,.97);
  border-right:none;
  padding:0 20px;flex-shrink:0;
  border-radius:0 0 0 0;
  position:relative;z-index:1;
}
.topbar-logos img{height:34px;max-width:150px;object-fit:contain}
.topbar-logo-sep{width:1px;height:24px;background:rgba(0,0,0,.12);margin:0 4px}
.topbar-title-bar{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px 24px;position:relative;z-index:1;
}
.tt{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;text-align:center}
.ts{font-size:11.5px;color:rgba(255,255,255,.65);margin-top:3px;text-align:center;font-weight:400}
.topbar-search{
  display:flex;align-items:center;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);
  border-radius:24px;padding:7px 14px;
  gap:8px;flex-shrink:0;
  margin:0 20px;align-self:center;
  transition:background .15s;
  position:relative;z-index:1;min-width:220px;
  backdrop-filter:blur(4px);
}
.topbar-search:focus-within{background:rgba(255,255,255,.22)}
.topbar-search svg{width:13px;height:13px;stroke:rgba(255,255,255,.7);fill:none;stroke-width:2;flex-shrink:0}
.topbar-search input{
  background:none;border:none;outline:none;
  font-family:var(--font);font-size:12px;
  color:#fff;width:100%;
}
.topbar-search input::placeholder{color:rgba(255,255,255,.6)}

/* ── VIEWS ── */
.view{height:calc(100vh - 64px);overflow-y:auto;display:none}
.view.active{display:block}
.view::-webkit-scrollbar{width:6px}
.view::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}

/* ── LANDING VIEW ── */
#view-landing{background:var(--bg);padding:28px 36px 40px}
.landing-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.landing-title{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.03em}
.landing-sub{font-size:13px;color:var(--muted);margin-top:3px}
.landing-pills{display:flex;gap:8px;flex-shrink:0}
.l-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);font-size:12px;font-weight:600;color:var(--muted);
}

/* ── CENTER CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.ccard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-xl);overflow:hidden;cursor:pointer;
  transition:box-shadow .2s,transform .15s,border-color .2s;
  position:relative;
}
.ccard:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);border-color:var(--border-2)}
.ccard-accent{height:4px;width:100%}
.ccard-body{padding:18px 18px 16px}
.ccard-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ccard-logo{
  width:56px;height:32px;border-radius:7px;
  background:var(--surface-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;position:relative;
}
.ccard-logo img{max-width:50px;max-height:28px;object-fit:contain}
.ccard-logo-blob{
  position:absolute;right:-8px;top:-8px;
  width:36px;height:36px;border-radius:50%;
  opacity:.15;filter:blur(8px);pointer-events:none;
}
.ccard-fallback{
  width:32px;height:32px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;flex-shrink:0;
}
.ccard-meta{flex:1;min-width:0}
.ccard-id{font-family:var(--mono);font-size:10px;color:var(--subtle);margin-bottom:2px}
.ccard-name{font-size:14px;font-weight:800;color:var(--navy);letter-spacing:-.02em;line-height:1.2}
.ccard-year{font-size:11px;color:var(--subtle);margin-top:2px}

/* Stats row */
.ccard-stats{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.ccard-stat{
  flex:1;padding:9px 8px;text-align:center;
  border-right:1px solid var(--border);
}
.ccard-stat:last-child{border-right:none}
.cs-val{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-.03em;line-height:1}
.cs-lbl{font-family:var(--mono);font-size:8.5px;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* Tags + status row */
.ccard-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ccard-tags{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.ctag{
  font-size:10.5px;padding:2px 8px;border-radius:12px;
  background:var(--surface-2);border:1px solid var(--border);color:var(--muted);
  white-space:nowrap;
}
.ccard-arrow{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;flex-shrink:0;font-size:13px;font-weight:700;
}

/* Indicator dots on card */
.ccard-indicators{display:flex;gap:4px;margin-bottom:10px}
.ind-dot{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10.5px;color:var(--muted);
  background:var(--surface-2);border:1px solid var(--border);
  padding:2px 8px;border-radius:12px;
}
.ind-circle{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── DETAIL VIEW ── */
#view-detail{background:var(--bg)}
.detail-layout{display:flex;flex-direction:column;height:100%}
.detail-topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 36px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:30;
}
.ds-back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;color:var(--blue);
  background:var(--blue-light);border:1px solid #C5DCF5;
  padding:6px 14px;border-radius:20px;cursor:pointer;
  font-family:var(--font);transition:background .15s;
  text-decoration:none;
}
.ds-back:hover{background:#DBEAFE}

.detail-canvas{flex:1;overflow-y:auto;background:var(--bg);overflow-x:hidden}
.detail-canvas::-webkit-scrollbar{width:6px}
.detail-canvas::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.canvas-head{background:var(--white);border-bottom:1px solid var(--border);padding:22px 28px;display:flex;align-items:center;gap:22px;box-shadow:var(--shadow-sm);border-left:5px solid transparent}
.ch-logo-wrap{width:100px;height:52px;border-radius:var(--r-lg);background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;position:relative}
.ch-logo-wrap img{max-width:92px;max-height:46px;object-fit:contain;position:relative;z-index:1}
.ch-blob{position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;opacity:.12;filter:blur(16px);pointer-events:none}
.ch-fallback{width:42px;height:42px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.ch-info{flex:1}
.ch-eyebrow{font-family:var(--mono);font-size:10px;color:var(--blue);letter-spacing:.06em;margin-bottom:4px}
.ch-title{font-size:18px;font-weight:800;color:#111;letter-spacing:-.025em;line-height:1.2;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.chip-dot{width:5px;height:5px;border-radius:50%}
.chip-green{background:var(--green-light);color:var(--green);border-color:#B2DFB9} .chip-green .chip-dot{background:#2DA44E}
.chip-slate{background:#F5F5F5;color:#555;border-color:#DDD} .chip-slate .chip-dot{background:#AAA}
.chip-blue{background:var(--blue-light);color:var(--blue);border-color:#C5DCF5} .chip-blue .chip-dot{background:#378ADD}
.chip-amber{background:var(--amber-light);color:var(--amber);border-color:#FCD34D} .chip-amber .chip-dot{background:#F59E0B}
.canvas-body{padding:22px 28px 48px;display:flex;flex-direction:column;gap:8px;max-width:1300px;margin:0 auto;width:100%}
.section{
  background:var(--white);border-radius:var(--r-lg);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  overflow:hidden;transition:box-shadow .2s,transform .15s;
}
.section:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.section-trigger{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;
  cursor:pointer;user-select:none;transition:background .1s;
}
.section-trigger:hover{background:#F8FAFF}
.section-icon{font-size:15px;width:20px;text-align:center;line-height:1;flex-shrink:0}
.section-name{
  font-size:14px;font-weight:700;color:var(--navy);
  flex:1;letter-spacing:-.02em;
}
.section-badge{
  font-family:var(--mono);font-size:10px;color:var(--subtle);
  background:#F0F4FA;border:1px solid var(--border);
  padding:2px 9px;border-radius:20px;
}
.chevron{width:18px;height:18px;color:var(--subtle);transition:transform .2s;flex-shrink:0}
.chevron svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.section.open .chevron{transform:rotate(90deg)}
.section.open .section-trigger{background:var(--blue-light)}
.section.open .section-name{color:var(--blue)}
.section-body{
  display:none;padding:0 20px 18px;
  border-top:1px solid var(--border);
}
.section.open .section-body{display:block;animation:secIn .15s ease}
@keyframes secIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.sec-inner{padding-top:14px}
.prose{font-size:13.5px;color:var(--text);line-height:1.75}
.propval{font-size:12.5px;color:var(--muted);line-height:1.7;font-style:italic;border-left:3px solid var(--blue-mid);padding:7px 0 7px 15px;margin-top:14px;background:linear-gradient(90deg,rgba(27,79,168,.05) 0%,transparent 80%);border-radius:0 8px 8px 0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field-label{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.field-val{font-size:13px;color:var(--text)}
.field-link{font-size:12.5px;color:var(--blue);text-decoration:none;font-weight:600}
.field-link:hover{text-decoration:underline}
.map-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;font-weight:600;color:var(--blue);text-decoration:none;background:var(--blue-light);border:1px solid #C5DCF5;padding:4px 12px;border-radius:var(--r);transition:background .1s}
.map-btn:hover{background:#DBEAFE}
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;margin:2px 2px 2px 0}
.t-blue{background:var(--blue-light);color:var(--blue)}
.t-green{background:var(--green-light);color:var(--green);font-weight:600}
.t-yellow{background:var(--amber-light);color:var(--amber);font-weight:600;border:1px solid #FDE68A}
.serv-wrap{display:flex;flex-wrap:wrap;gap:6px}
.s-tag{font-size:12px;padding:4px 12px;border-radius:var(--r);background:var(--blue-light);color:var(--blue);border:1px solid #C5DCF5;font-weight:500}
.linea-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:var(--r);background:#F8FAFF;border:1px solid var(--border);margin-bottom:6px}
.linea-row:last-child{}
.l-icon{font-size:16px;min-width:24px;text-align:center;flex-shrink:0;line-height:1.45}
.l-text{font-size:12.5px;color:var(--muted);line-height:1.5}
.collapse-wrap .items-hidden{display:none}
.collapse-wrap.expanded .items-hidden{display:block}
.btn-more{margin-top:9px;font-size:12px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;font-family:var(--font)}
.btn-more:hover{opacity:.7}
.empty-row{display:flex;align-items:center;gap:8px;padding:10px 0;color:var(--subtle);font-size:12.5px}
.empty-icon{font-size:16px;opacity:.35}
.add-btn{display:inline-block;margin-top:7px;font-size:12px;font-weight:600;color:var(--muted);background:none;border:1px dashed var(--border-2);border-radius:var(--r);padding:5px 15px;cursor:pointer;font-family:var(--font);transition:all .15s}
.add-btn:hover{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
/* INV DASHBOARD */
.inv-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.inv-stat{background:#F8FAFF;border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center;transition:box-shadow .15s,transform .15s}
.inv-stat:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.inv-stat-val{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.03em;line-height:1;margin-bottom:4px;font-family:var(--mono)}
.inv-stat-lbl{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.inv-stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.inv-section-title{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--subtle);text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:6px}
.inv-section-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--blue);border-radius:2px;flex-shrink:0}
.inv-gender-block{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px}
.inv-gender-block .inv-section-title{margin-bottom:10px}
.gender-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;display:flex;margin-bottom:8px}
.gender-bar-f{background:#F43F5E;transition:width .6s ease}
.gender-bar-m{background:#3B82F6;transition:width .6s ease}
.gender-legend{display:flex;gap:16px}
.gender-leg-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)}
.gender-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.inv-list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px}
.inv-person{display:flex;align-items:flex-start;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;transition:border-color .15s,box-shadow .15s}
.inv-person:hover{border-color:var(--border-2);box-shadow:var(--shadow-sm)}
.inv-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.inv-av-f{background:linear-gradient(135deg,#F43F5E,#FB7185)}
.inv-av-m{background:linear-gradient(135deg,var(--navy),var(--blue-mid))}
.inv-pdata{min-width:0}
.inv-pname{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.25}
.inv-prol{font-size:10.5px;color:var(--muted);margin-top:1px;line-height:1.3}
.inv-pjer{font-family:var(--mono);font-size:9.5px;color:var(--subtle);margin-top:2px}
.inv-pemail{display:block;font-size:10px;color:var(--blue);margin-top:3px;text-decoration:none;word-break:break-all}
.inv-pemail:hover{text-decoration:underline}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ccard{animation:fadeUp .3s ease both}
.ccard:nth-child(2){animation-delay:.04s}
.ccard:nth-child(3){animation-delay:.08s}
.ccard:nth-child(4){animation-delay:.12s}
.ccard:nth-child(5){animation-delay:.16s}
.ccard:nth-child(6){animation-delay:.20s}
.ccard:nth-child(7){animation-delay:.24s}
.ccard:nth-child(8){animation-delay:.28s}
.ccard:nth-child(9){animation-delay:.32s}
.ccard:nth-child(10){animation-delay:.36s}
.ccard:nth-child(11){animation-delay:.40s}
.ccard:nth-child(12){animation-delay:.44s}
.canvas-head{animation:fadeUp .2s ease}
.section{animation:fadeUp .2s ease both}
.section:nth-child(2){animation-delay:.04s}
.section:nth-child(3){animation-delay:.08s}
.section:nth-child(4){animation-delay:.12s}
.section:nth-child(5){animation-delay:.16s}
.section:nth-child(6){animation-delay:.20s}
.section:nth-child(7){animation-delay:.24s}
.section:nth-child(8){animation-delay:.28s}
</style>
</head>
<body>

<!-- TOPBAR -->

// Apps Script → Implementar → Nueva implementación → Aplicación web → Copiar URL
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJQ9P_YnEF64m4KqeJQBl96Fb93_NNUlU6bih1qmRtVHZJLsit1kPMjB2_UwiD18xr/exec';
// ─────────────────────────────────────────────────────────────────────────────

let CENTROS = [];

async function cargarDatos() {
  // Muestra estado de carga en el grid
  document.getElementById('cards-grid').innerHTML =
    '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted);font-size:13px">Cargando datos...</div>';
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    CENTROS = await res.json();
  } catch(e) {
    console.error('Error cargando datos desde Apps Script:', e);
    document.getElementById('cards-grid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:48px;color:#c0392b;font-size:13px">⚠ No se pudo cargar la base de datos. Verifica la URL del Apps Script.</div>';
    return;
  }
  buildLanding();
}

const PAL = [["#E6F1FB", "#185FA5"], ["#E1F5EE", "#0F6E56"], ["#FAEEDA", "#854F0B"], ["#FAECE7", "#993C1D"], ["#EEEDFE", "#534AB7"], ["#FBEAF0", "#99355A"], ["#EAF3DE", "#3B6D11"], ["#F1EFE8", "#5F5E5A"], ["#E6F1FB", "#0C447C"], ["#FCEBEB", "#A32D2D"], ["#E1F5EE", "#085041"], ["#FAEEDA", "#633806"]];
const ACCENT = ["#185FA5", "#0F6E56", "#854F0B", "#993C1D", "#534AB7", "#99355A", "#3B6D11", "#5F5E5A", "#0C447C", "#A32D2D", "#085041", "#633806"];

const DOT_CORFO = {inscrito:'#2DA44E', no_confirmado:'#C8C8C8'};
let cur = 0;
const openSections = new Set(['desc','lineas']);

/* ── LANDING ── */
function buildLanding() {
  const grid = document.getElementById('cards-grid');
  const pills = document.getElementById('landing-pills');
  const total = CENTROS.length;
  const inscritos = CENTROS.filter(c=>c.corfo.estado==='inscrito').length;
  const conServ   = CENTROS.filter(c=>c.servicios_empresas).length;
  const totalInv  = CENTROS.reduce((s,c)=>s+(c.investigators||[]).length,0);

  pills.innerHTML = `
    <div class="l-pill">🏛 ${total} centros</div>
    <div class="l-pill">👥 ${totalInv} investigadores</div>
    <div class="l-pill" style="color:var(--green)">✅ ${inscritos} CORFO</div>`;

  grid.innerHTML = CENTROS.map((c,i) => {
    const pal    = PAL[i%PAL.length];
    const accent = ACCENT[i%ACCENT.length];
    const logo   = LOGOS[c.id];
    const invN   = (c.investigators||[]).length;
    const linN   = c.lineas.length;
    const tems   = (c.tematicas||[]).slice(0,3);
    const d1     = DOT_CORFO[c.corfo.estado]||'#C8C8C8';
    const d2     = c.servicios_empresas?'#378ADD':(c.aportes_sociales?.length?'#F59E0B':'#E0E0E0');
    const corfoLbl  = c.corfo.estado==='inscrito'?'Inscrito CORFO':'No inscrito CORFO';
    const servLbl   = c.servicios_empresas?'Servicios a empresas':'Aportes a la sociedad';

    const logoHtml = logo
      ? `<div class="ccard-logo"><div class="ccard-logo-blob" style="background:${accent}"></div><img src="${logo}" alt="${c.id}"></div>`
      : `<div class="ccard-fallback" style="background:${pal[0]};color:${pal[1]}">${c.id}</div>`;

    return `<div class="ccard" onclick="openDetail(${i})">
      <div class="ccard-accent" style="background:${accent}"></div>
      <div class="ccard-body">
        <div class="ccard-header">
          ${logoHtml}
          <div class="ccard-meta">
            <div class="ccard-id">${c.id}</div>
            <div class="ccard-name">${c.nombre}</div>
            <div class="ccard-year">Est. ${c.anio||'—'}</div>
          </div>
        </div>
        <div class="ccard-stats">
          <div class="ccard-stat"><div class="cs-val">${invN||'—'}</div><div class="cs-lbl">Investigadores</div></div>
          <div class="ccard-stat"><div class="cs-val">${linN}</div><div class="cs-lbl">Líneas I+D</div></div>
          <div class="ccard-stat"><div class="cs-val">${(c.keywords||[]).length}</div><div class="cs-lbl">Keywords</div></div>
        </div>
        <div class="ccard-indicators">
          <span class="ind-dot"><span class="ind-circle" style="background:${d1}"></span>${corfoLbl}</span>
          <span class="ind-dot"><span class="ind-circle" style="background:${d2}"></span>${servLbl}</span>
        </div>
        <div class="ccard-footer">
          <div class="ccard-tags">${tems.map(t=>`<span class="ctag">${t}</span>`).join('')}</div>
          <div class="ccard-arrow" style="background:${accent}">›</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── DETAIL ── */
function openDetail(i) {
  cur = i;
  document.getElementById('view-landing').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  renderDetail();
  document.querySelector('.detail-canvas').scrollTo(0,0);
}

function showLanding() {
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-landing').classList.add('active');
}

function buildNav() {
  document.getElementById('nav').innerHTML = CENTROS.map((c,i) => {
    const pal=PAL[i%PAL.length], logo=LOGOS[c.id];
    const d1=DOT_CORFO[c.corfo.estado]||'#C8C8C8';
    const d2=c.servicios_empresas?'#378ADD':(c.aportes_sociales?.length?'#F59E0B':'#E0E0E0');
    const pill=logo?`<div class="ti-pill" style="background:#F8F8F8"><img src="${logo}" alt="${c.id}"></div>`:`<div class="ti-pill" style="background:${pal[0]};color:${pal[1]}">${c.id}</div>`;
    return `<div class="ti${i===cur?' active':''}" onclick="selDetail(${i})">
      ${pill}<div class="ti-info"><div class="ti-name">${c.id}</div><div class="ti-yr">Est. ${c.anio||'—'}</div></div>
      <div class="ti-dots"><span class="tdot" style="background:${d1}"></span><span class="tdot" style="background:${d2}"></span></div>
    </div>`;
  }).join('');
}

function chevron() {
  return `<span class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>`;
}

function mkSection(id, icon, name, badge, content) {
  const isOpen = openSections.has(id);
  return `<div class="section${isOpen?' open':''}" data-sid="${id}">
    <div class="section-trigger" onclick="toggleSec('${id}',this)">
      <span class="section-icon">${icon}</span>
      <span class="section-name">${name}</span>
      ${badge?`<span class="section-badge">${badge}</span>`:''}
      ${chevron()}
    </div>
    <div class="section-body"><div class="sec-inner">${content}</div></div>
  </div>`;
}

function toggleSec(id, trigger) {
  const el=trigger.closest('.section');
  el.classList.toggle('open');
  openSections.has(id)?openSections.delete(id):openSections.add(id);
}

function collapse(items,fn,lim=5) {
  if(items.length<=lim) return items.map(fn).join('');
  const rem=items.length-lim;
  return `<div class="collapse-wrap">${items.slice(0,lim).map(fn).join('')}<div class="items-hidden">${items.slice(lim).map(fn).join('')}</div><button class="btn-more" onclick="this.closest('.collapse-wrap').classList.toggle('expanded');this.textContent=this.closest('.collapse-wrap').classList.contains('expanded')?'▲ Ver menos':'▼ Ver ${rem} más'">▼ Ver ${rem} más</button></div>`;
}

function lineIcon(t) {
  t=t.toLowerCase();
  if(/investig/.test(t))return'🔬';if(/asesor|consult/.test(t))return'🤝';
  if(/capacit|transfer/.test(t))return'🎓';if(/escalamiento|ensayo/.test(t))return'⚗️';
  if(/innov|cambio/.test(t))return'💡';if(/internacion/.test(t))return'🌐';
  if(/asistencia|técnic/.test(t))return'🛠️';if(/política|propuesta/.test(t))return'📋';
  if(/conserv|biodiversidad/.test(t))return'🌿';if(/comunidad|social/.test(t))return'🏘️';
  if(/digital|sistema|tecnolog/.test(t))return'💻';if(/robótic|maker/.test(t))return'🤖';
  if(/alfabet|niño|joven/.test(t))return'📚';if(/miner|metalurg/.test(t))return'⛏️';
  if(/sustentab|sostenib/.test(t))return'♻️';if(/informe|pericial/.test(t))return'⚖️';
  if(/diplomado/.test(t))return'🏅';if(/liderazgo|líder/.test(t))return'🧭';
  if(/docente|pedagog/.test(t))return'👩‍🏫';if(/formaci|vinculación/.test(t))return'🔗';
  if(/recurso/.test(t))return'📦';if(/pregrado/.test(t))return'🎒';return'▸';
}

function renderDetail() {
  const c=CENTROS[cur],pal=PAL[cur%PAL.length],accent=ACCENT[cur%ACCENT.length],logo=LOGOS[c.id];
  const logoHtml=logo?`<div class="ch-logo-wrap"><div class="ch-blob" style="background:${accent}"></div><img src="${logo}" alt="${c.nombre}"></div>`:`<div class="ch-fallback" style="background:${pal[0]};color:${pal[1]}">${c.id}</div>`;
  const corfoChip=c.corfo.estado==='inscrito'?`<span class="chip chip-green"><span class="chip-dot"></span>Inscrito CORFO I+D</span>`:`<span class="chip chip-slate"><span class="chip-dot"></span>No inscrito CORFO I+D</span>`;
  const servChip=c.servicios_empresas?`<span class="chip chip-blue"><span class="chip-dot"></span>Ofrece servicios a empresas</span>`:`<span class="chip chip-amber"><span class="chip-dot"></span>Aportes a la sociedad</span>`;
  const ch=document.getElementById('ch');
  ch.innerHTML=`${logoHtml}<div class="ch-info"><div class="ch-eyebrow">Centro de Investigación · PUCV · Est. ${c.anio}</div><div class="ch-title">${c.nombre}</div><div class="chips">${corfoChip}${servChip}</div></div>`;
  ch.style.borderLeftColor=accent;
  const secs=[];
  secs.push(mkSection('desc','📄','Descripción y Propuesta de Valor','',`<div class="prose">${c.descripcion}</div><div class="propval">${c.propval}</div>`));
  secs.push(mkSection('info','🔗','Información General','',`<div class="two-col"><div><div class="field-label">Sitio Web</div><a class="field-link" href="${c.web}" target="_blank">${c.web}</a></div><div><div class="field-label">Correo</div><div class="field-val">${c.correo}</div></div><div><div class="field-label">Director/a</div><div class="field-val">${c.director||'—'}</div></div><div><div class="field-label">Ubicación</div><div class="field-val">${c.direccion}</div><div style="font-size:11px;color:var(--subtle);margin-top:2px">${c.comuna} · ${c.region}</div><a class="map-btn" href="${c.maps}" target="_blank">🗺️ Ver en Maps</a></div></div>`));
  if(c.servicios_empresas&&c.lineas.length)secs.push(mkSection('serv','🤝','Servicios a Empresas',`${c.lineas.length}`,`<div class="serv-wrap">${c.lineas.map(s=>`<span class="s-tag">${s}</span>`).join('')}</div>`));
  else if(!c.servicios_empresas&&c.aportes_sociales?.length)secs.push(mkSection('aporte','⭐','Aportes a la Sociedad',`${c.aportes_sociales.length}`,`<div>${c.aportes_sociales.map(a=>`<span class="tag t-yellow">${a}</span>`).join('')}</div>`));
  const linContent=c.lineas.length?collapse(c.lineas,l=>`<div class="linea-row"><span class="l-icon">${lineIcon(l)}</span><span class="l-text">${l}</span></div>`,5):`<div class="empty-row"><span class="empty-icon">🔬</span>Sin líneas registradas</div>`;
  secs.push(mkSection('lineas','🔬','Líneas de Investigación',c.lineas.length?`${c.lineas.length}`:'',linContent));
  /* Investigadores */
  const invData=c.investigators||[];
  let invContent='';
  if(invData.length){
    const total=invData.length,fem=invData.filter(p=>p.genero==='F').length,mas=total-fem;
    const dirs=invData.filter(p=>p.is_director).length,acad=invData.filter(p=>p.is_academic).length,pdc=invData.filter(p=>p.is_postdoc).length;
    const fpct=total>0?Math.round(fem/total*100):0,mpct=100-fpct;
    const ini=n=>n.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
    invContent=`
      <div class="inv-stats">
        <div class="inv-stat"><div class="inv-stat-val">${total}</div><div class="inv-stat-lbl">Investigadores</div><div class="inv-stat-sub">Planta activa</div></div>
        <div class="inv-stat"><div class="inv-stat-val">${dirs}</div><div class="inv-stat-lbl">Directivos</div><div class="inv-stat-sub">Roles de dirección</div></div>
        <div class="inv-stat"><div class="inv-stat-val">${acad}</div><div class="inv-stat-lbl">Académicos</div><div class="inv-stat-sub">Prof. jerarquizados</div></div>
        <div class="inv-stat"><div class="inv-stat-val">${pdc}</div><div class="inv-stat-lbl">Post-doctoral</div><div class="inv-stat-sub">Investigadores PD</div></div>
      </div>
      <div class="inv-gender-block">
        <div class="inv-section-title">Composición de Género</div>
        <div class="gender-bar"><div class="gender-bar-f" style="width:${fpct}%"></div><div class="gender-bar-m" style="width:${mpct}%"></div></div>
        <div class="gender-legend">
          <span class="gender-leg-item"><span class="gender-dot" style="background:#F43F5E"></span>Femenino: ${fem} (${fpct}%)</span>
          <span class="gender-leg-item"><span class="gender-dot" style="background:#3B82F6"></span>Masculino: ${mas} (${mpct}%)</span>
        </div>
      </div>
      <div class="inv-section-title" style="margin-bottom:8px">Equipo de Investigación</div>
      <div class="inv-list-grid">${invData.map(p=>`
        <div class="inv-person">
          <div class="inv-avatar ${p.genero==='F'?'inv-av-f':'inv-av-m'}">${ini(p.nombre)}</div>
          <div class="inv-pdata">
            <div class="inv-pname">${p.nombre}</div>
            ${p.rol?`<div class="inv-prol">${p.rol}</div>`:''}
            ${p.jerarquia&&p.jerarquia!='nan'&&p.jerarquia?`<div class="inv-pjer">${p.jerarquia}</div>`:''}
            ${p.correo&&p.correo!='nan'&&p.correo?`<a class="inv-pemail" href="mailto:${p.correo}">${p.correo}</a>`:''}
          </div>
        </div>`).join('')}</div>`;
  } else {
    invContent=`<div class="empty-row"><span class="empty-icon">👥</span>Sin investigadores en la base de datos actual</div>`;
  }
  secs.push(mkSection('inv','👥','Investigadores',invData.length?invData.length+' personas':'',invContent));
  secs.push(mkSection('proy','📁','Proyectos en Curso','pendiente',`<div class="empty-row"><span class="empty-icon">📁</span>Sin proyectos registrados</div><button class="add-btn">+ Agregar proyectos</button>`));
  document.getElementById('body').innerHTML=secs.join('');
}

function selDetail(i){cur=i;buildNav();renderDetail();document.querySelector('.detail-canvas').scrollTo(0,0);}

// Search filter
function filterCards(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.ccard').forEach((el,i) => {
    const c = CENTROS[i];
    const txt = [c.nombre,c.id,c.areas,...(c.tematicas||[]),...(c.keywords||[])].join(' ').toLowerCase();
    el.style.display = (!q || txt.includes(q)) ? '' : 'none';
  });
}

// Init
cargarDatos();
</script>
</body>
